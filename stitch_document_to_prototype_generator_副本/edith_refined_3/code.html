<script>
        // Micro-interaction for keyword floating effect
        document.addEventListener('mousemove', (e) => {
            const items = document.querySelectorAll('.keyword-item');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;

            items.forEach((item, index) => {
                const depth = (index + 1) * 0.2;
                item.style.transform = `translate(${x * depth}px, ${y * depth}px) rotate(${item.getAttribute('data-initial-rotate') || '0'}deg)`;
            });
        });

        // Store initial rotation for consistent movement
        document.querySelectorAll('.keyword-item').forEach(item => {
            const transform = window.getComputedStyle(item).getPropertyValue('transform');
            if (transform !== 'none') {
                const values = transform.split('(')[1].split(')')[0].split(',');
                const a = values[0];
                const b = values[1];
                const angle = Math.round(Math.atan2(b, a) * (180/Math.PI));
                item.setAttribute('data-initial-rotate', angle);
            }
        });
    </script>
