    <script>
      // Decode path redirected from 404.html back into browser history
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var path = '/' + p.replace(/~and~/g, '&');
          var q = params.get('q');
          if (q) path += '?' + q.replace(/~and~/g, '&');
          window.history.replaceState(null, '', path + window.location.hash);
        }
      })();
    </script>
